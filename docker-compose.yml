services:
  telecloud:
    image: ghcr.io/takeshi7502/telecloud-go:latest
    container_name: telecloud
    restart: unless-stopped
    ports:
      - "${PORT:-8091}:8091"
    env_file:
      - .env
    user: "65532:65532"
    environment:
      # Override paths to point inside /app/data volume
      - PORT=8091
      - DATABASE_PATH=/app/data/database.db
      - THUMBS_DIR=/app/data/thumbs
      - TEMP_DIR=/app/data/temp
      # Optional: Paths to FFmpeg and yt-dlp. These are built into the Docker image,
      # but you can override them here if you want to use external binaries.
      - FFMPEG_PATH=/usr/bin/ffmpeg
      - YTDLP_PATH=/usr/local/bin/yt-dlp
    volumes:
      # Persist database, thumbnails, temp files, and Telegram session
      - ./data:/app/data
    # NOTE: distroless/static image has no shell or wget/curl,
    # so CMD-SHELL healthchecks cannot work inside the container.
    # Use an external monitoring tool or a sidecar container instead.
    # healthcheck:
    #   test: ["CMD-SHELL", "wget -qO- http://localhost:8091/ > /dev/null 2>&1 || exit 1"]
    #   interval: 30s
    #   timeout: 10s
    #   retries: 3
    #   start_period: 15s
